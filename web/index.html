  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ackground: 255 255 255;\n  --color-background-alt: 243 246 249;\n  --color-background-alt2: 23 92 219;\n  --color-background-alt3: 22 55 146;\n  --color-background-alt4: 2 15 102;\n\n  --color-primary-100: 219 229 246;\n  --color-primary-300: 121 161 233;\n  --color-primary-600: 23 93 220;\n  --color-primary-700: 26 65 172;\n\n  --color-secondary-100: 230 233 239;\n  --color-secondary-300: 168 179 200;\n  --color-secondary-500: 90 109 145;\n  --color-secondary-600: 83 99 131;\n  --color-secondary-700: 63 75 99;\n\n  --color-info-100: 219 229 246;\n  --color-info-600: 121 161 233;\n  --color-info-700: 13 36 123;\n\n  --color-warning-100: 255 244 212;\n  --color-warning-600: 255 191 0;\n  --color-warning-700: 142 64 0;\n\n  --color-danger-100: 255 236 239;\n  --color-danger-600: 203 38 58;\n  --color-danger-700: 149 27 42;\n\n  --color-success-100: 213 243 216;\n  --color-success-600: 12 128 24;\n  --color-success-700: 8 81 15;\n\n  --color-notification-100: 255 225 247;\n  --color-notification-600: 192 17 118;\n\n  --color-text-main: 27 32 41;\n  --color-text-muted: 96 109 145;\n  --color-text-contrast: 255 255 255;\n  --color-text-alt2: 255 255 255;\n  --color-text-code: 192 17 118;\n\n  --color-hover-default: rgb(26 65 172 / 0.1);\n  --color-hover-contrast: rgb(255 255 255 / 0.15);\n\n  --color-marketing-logo: 23 93 220;\n  --color-bw-blue: 23 93 220;\n\n  --color-illustration-outline: 2 15 102;\n  --color-illustration-bg-primary: 219 229 246;\n  --color-illustration-bg-secondary: 170 195 239;\n  --color-illustration-bg-tertiary: 255 255 255;\n  --color-illustration-tertiary: 255 191 0;\n  --color-illustration-logo: 23 93 220;\n\n  /* ---- Primitive palette (hex) — the new Figma design system ----------- */\n\n  /* Brand (Bitwarden blue) */\n  --color-brand-050: #eef6ff;\n  --color-brand-100: #dbeafe;\n  --color-brand-200: #bedbff;\n  --color-brand-300: #8ec5ff;\n  --color-brand-400: #6baefa;\n  --color-brand-500: #418bfb;\n  --color-brand-600: #2a70f4;\n  --color- :0 20px; border-radius:8px; background:{{accent}}; display:flex; align-items:center; cursor:pointer;\" style-hover=\"filter:brightness(0.92)\"><span style=\"font-size:14px; font-weight:500; color:rgb(255,255,255);\">Done<\u002Fspan><\u002Fdiv>\n            <div onclick=\"{{onResetCols}}\" style=\"height:40px; padding:0 20px; border:1px solid rgb(213,221,232); border-radius:8px; background:rgb(255,255,255); display:flex; align-items:center; cursor:pointer; color:rgb(16,24,40);\" style-hover=\"background:rgb(247,249,250)\"><span style=\"font-size:14px; font-weight:500;\">Reset to default<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ ADD / EDIT FOLDER DIALOG (overlay) ============ -->\n    <sc-if value=\"{{folderModalOpen}}\" hint-placeholder-val=\"{{false}}\">\n      <div onclick=\"{{closeFolderModal}}\" style=\"position:absolute; inset:0; background:rgba(15,23,43,0.4); z-index:80; display:flex; align-items:center; justify-content:center;\">\n        <div onclick=\"{{stopProp}}\" style=\"width:480px; background:rgb(255,255,255); border-radius:12px; box-shadow:0 24px 56px rgba(29,41,61,0.28); padding:24px;\">\n          <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;\">\n            <span style=\"font-size:20px; font-weight:600; color:rgb(15,23,43);\">{{folderModalTitle}}<\u002Fspan>\n            <div onclick=\"{{closeFolderModal}}\" style=\"width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:rgb(69,85,108);\" style-hover=\"background:rgb(247,249,250)\"><i class=\"bwi bwi-close\" style=\"font-size:18px;\"><\u002Fi><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:16px;\">\n            <div style=\"display:flex; flex-direction:column; gap:6px;\">\n              <span style=\"font-size:13px; font-weight:600; color:rgb(69,85,108);\">Name<\u002Fspan>\n              <input value=\"{{folderModalName}}\" oninput=\"{{onFolderName}}\" placeholder=\"e.g. Banking\" style=\"height:40px; border:1px solid rgb(213,221,232); border-radius:8px; padding:0 12px; font-size:14px; color:rgb(15,23,43); outline:none;\">\n            <\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:6px;\">\n              <span style=\"font-size:13px; font-weight:600; color:rgb(69,85,108);\">Description<\u002Fspan>\n              <textarea value=\"{{folderModalDesc}}\" oninput=\"{{onFolderDesc}}\" placeholder=\"Optional\" style=\"min-height:72px; resize:vertical; border:1px solid rgb(213,221,232); border-radius:8px; padding:10px 12px; font-size:14px; color:rgb(15,23,43); outline:none; font-family:inherit; line-height:20px;\"><\u002Ftextarea>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:12px; margin-top:24px;\">\n            <div onclick=\"{{saveFolder}}\" style=\"height:40px; padding:0 20px; border-radius:8px; background:{{accent}}; display:flex; align-items:center; cursor:pointer;\" style-hover=\"filter:brightness(0.92)\"><span style=\"font-size:14px; font-weight:500; color:rgb(255,255,255);\">Save<\u002Fspan><\u002Fdiv>\n            <div onclick=\"{{closeFolderModal}}\" style=\"height:40px; padding:0 20px; border:1px solid rgb(213,221,232); border-radius:8px; background:rgb(255,255,255); display:flex; align-items:center; cursor:pointer; color:rgb(16,24,40);\" style-hover=\"background:rgb(247,249,250)\"><span style=\"font-size:14px; font-weight:500;\">Cancel<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ EDIT SHARED FOLDER DIALOG (overlay) ============ -->\n    <sc-if value=\"{{collModalOpen}}\" hint-placeholder-val=\"{{false}}\">\n      <div onclick=\"{{closeCollModal}}\" style=\"position:absolute; inset:0; background:rgba(15,23,43,0.4); z-index:80; display:flex; align-items:center; justify-content:center;\">\n        <div onclick=\"{{stopProp}}\" style=\"width:560px; background:rgb(255,255,255); border-radius:12px; box-shadow:0 24px 56px rgba(29,41,61,0.28); padding:24px;\">\n          <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;\">\n            <div style=\"display:flex; align-items:baseline; gap:10px;\">\n              <span style=\"font-size:20px; font-weight:600; color:rgb(15,23,43);\">Edit shared folder<\u002Fspan>\n              <span style=\"font-size:14px; font-weight:400; color:rgb(98,116,142);\">{{collModalSub}}<\u002Fspan>\n            <\u002Fdiv>\n            <div onclick=\"{{closeCollModal}}\" style=\"width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:rgb(69,85,108);\" style-hover=\"background:rgb(247,249,250)\"><i class=\"bwi bwi-close\" style=\"font-size:18px;\"><\u002Fi><\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Tabs -->\n          <div style=\"display:flex; flex-direction:row; align-items:center; gap:24px; border-bottom:1px solid rgb(213,221,232); margin-bottom:20px;\">\n            <div onclick=\"{{onCollTabInfo}}\" style=\"padding:0 2px 12px 2px; border-bottom:2px solid {{collTabInfoBorder}}; margin-bottom:-1px; cursor:pointer;\"><span style=\"font-size:14px; font-weight:{{collTabInfoWeight}}; color:{{collTabInfoColor}};\">Shared folder info<\u002Fspan><\u002Fdiv>\n            <div onclick=\"{{onCollTabAccess}}\" style=\"padding:0 2px 12px 2px; border-bottom:2px solid {{collTabAccessBorder}}; margin-bottom:-1px; cursor:pointer;\"><span style=\"font-size:14px; font-weight:{{collTabAccessWeight}}; color:{{collTabAccessColor}};\">Edit access<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Tab: Shared folder info -->\n          <sc-if value=\"{{collTabInfo}}\" hint-placeholder-val=\"{{true}}\">\n            <div style=\"display:flex; flex-direction:column; gap:16px; min-height:150px;\">\n              <div style=\"display:flex; flex-direction:column; gap:6px;\">\n                <span style=\"font-size:13px; font-weight:600; color:rgb(69,85,108);\">Name <span style=\"color:rgb(191,44,44);\">*<\u002Fspan><\u002Fspan>\n                <input value=\"{{collModalName}}\" oninput=\"{{onCollName}}\" placeholder=\"e.g. Household\" style=\"height:40px; border:1px solid rgb(213,221,232); border-radius:8px; padding:0 12px; font-size:14px; color:rgb(15,23,43); outline:none;\">\n              <\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; gap:6px;\">\n                <span style=\"font-size:13px; font-weight:600; color:rgb(69,85,108);\">Nest collection under<\u002Fspan>\n                <div style=\"position:relative;\">\n                  <select value=\"{{collNestValue}}\" onchange=\"{{onCollNest}}\" style=\"width:100%; height:40px; border:1px solid rgb(213,221,232); border-radius:8px; padding:0 36px 0 12px; font-size:14px; color:rgb(15,23,43); outline:none; background:rgb(255,255,255); appearance:none; -webkit-appearance:none; cursor:pointer; font-family:inherit;\">\n                    <sc-for list=\"{{collNestOptions}}\" as=\"o\" hint-placeholder-count=\"4\"><option value=\"{{o.value}}\">{{o.label}}<\u002Foption><\u002Fsc-for>\n                  <\u002Fselect>\n                  <i class=\"bwi bwi-angle-down\" style=\"position:absolute; right:12px; top:50%; transform:translateY(-50%); font-size:14px; color:rgb(98,116,142); pointer-events:none;\"><\u002Fi>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- Tab: Edit access -->\n          <sc-if value=\"{{collTabAccess}}\" hint-placeholder-val=\"{{false}}\">\n            <div style=\"display:flex; flex-direction:column; gap:20px; min-height:150px;\">\n              <span style=\"font-size:14px; line-height:20px; color:rgb(69,85,108);\">Grant groups or members access to this shared folder. Administrators can access and manage shared folders.<\u002Fspan>\n              <div style=\"display:flex; flex-direction:row; align-items:flex-start; gap:16px;\">\n                <div style=\"width:180px; flex-shrink:0; display:flex; flex-direction:column; gap:6px;\">\n                  <span style=\"font-size:13px; font-weight:600; color:rgb(69,85,108);\">Permission<\u002Fspan>\n                  <div style=\"position:relative;\">\n                    <select value=\"{{collPermValue}}\" onchange=\"{{onCollPerm}}\" style=\"width:100%; height:40px; border:1px solid rgb(213,221,232); border-radius:8px; padding:0 36px 0 12px; font-size:14px; color:rgb(15,23,43); outline:none; background:rgb(255,255,255); appearance:none; -webkit-appearance:none; cursor:pointer; font-family:inherit;\">\n                      <sc-for list=\"{{collPermOptions}}\" as=\"o\" hint-placeholder-count=\"3\"><option value=\"{{o.value}}\">{{o.label}}<\u002Foption><\u002Fsc-for>\n                    <\u002Fselect>\n                    <i class=\"bwi bwi-angle-down\" style=\"position:absolute; right:12px; top:50%; transform:translateY(-50%); font-size:14px; color:rgb(98,116,142); pointer-events:none;\"><\u002Fi>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"flex:1; min-width:0; display:flex; flex-direction:column; gap:6px;\">\n                  <span style=\"font-size:13px; font-weight:600; color:rgb(69,85,108);\">Select groups and members<\u002Fspan>\n                  <div style=\"position:relative;\">\n                    <select value=\"\" onchange=\"{{onAddAccess}}\" style=\"width:100%; height:40px; border:1px solid rgb(213,221,232); border-radius:8px; padding:0 36px 0 12px; font-size:14px; color:rgb(98,116,142); outline:none; background:rgb(255,255,255); appearance:none; -webkit-appearance:none; cursor:pointer; font-family:inherit;\">\n                      <sc-for list=\"{{collAddOptions}}\" as=\"o\" hint-placeholder-count=\"6\"><option value=\"{{o.value}}\">{{o.label}}<\u002Foption><\u002Fsc-for>\n                    <\u002Fselect>\n                    <i class=\"bwi bwi-angle-down\" style=\"position:absolute; right:12px; top:50%; transform:translateY(-50%); font-size:14px; color:rgb(98,116,142); pointer-events:none;\"><\u002Fi>\n                  <\u002Fdiv>\n                  <span style=\"font-size:12px; line-height:16px; color:rgb(98,116,142);\">Permissions set for a member will replace permissions set by that member's group.<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <sc-if value=\"{{collHasAccess}}\" hint-placeholder-val=\"{{false}}\">\n                <div style=\"border:1px solid rgb(213,221,232); border-radius:12px; overflow:hidden;\">\n                  <div style=\"display:flex; flex-direction:row; align-items:center; height:44px; background:rgb(247,249,250); border-bottom:1px solid rgb(213,221,232);\">\n                    <div style=\"flex:1; min-width:0; padding:0 16px;\"><span style=\"font-size:13px; font-weight:600; color:rgb(69,85,108);\">Group/Member<\u002Fspan><\u002Fdiv>\n                    <div style=\"width:210px; padding:0 12px; flex-shrink:0;\"><span style=\"font-size:13px; font-weight:600; color:rgb(69,85,108);\">Permission<\u002Fspan><\u002Fdiv>\n                    <div style=\"width:52px; flex-shrink:0;\"><\u002Fdiv>\n                  <\u002Fdiv>\n                  <sc-for list=\"{{collAccessRows}}\" as=\"ar\" hint-placeholder-count=\"0\">\n                    <div style=\"display:flex; flex-direction:row; align-items:center; min-height:56px; background:rgb(255,255,255); border-bottom:1px solid rgb(233,238,243);\">\n                      <div style=\"flex:1; min-width:0; padding:8px 16px; display:flex; flex-direction:row; align-items:center; gap:10px;\">\n                        <div style=\"width:32px; height:32px; border-radius:8px; background:rgb(238,246,255); display:flex; align-items:center; justify-content:center; flex-shrink:0;\"><i class=\"bwi {{ar.icon}}\" style=\"font-size:15px; color:{{accent}};\"><\u002Fi><\u002Fdiv>\n                        <div style=\"display:flex; flex-direction:column; min-width:0;\">\n                          <span style=\"font-size:14px; font-weight:500; color:rgb(15,23,43); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ar.name}}<\u002Fspan>\n                          <sc-if value=\"{{ar.hasEmail}}\" hint-placeholder-val=\"{{false}}\"><span style=\"font-size:12px; color:rgb(98,116,142); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ar.email}}<\u002Fspan><\u002Fsc-if>\n                        <\u002Fdiv>\n                      <\u002Fdiv>\n                      <div style=\"width:210px; padding:0 12px; flex-shrink:0;\">\n                        <div style=\"position:relative;\">\n                          <select value=\"{{ar.permission}}\" onchange=\"{{ar.onPerm}}\" style=\"width:100%; height:36px; border:1px solid rgb(213,221,232); border-radius:8px; padding:0 32px 0 10px; font-size:13px; color:rgb(15,23,43); outline:none; background:rgb(255,255,255); appearance:none; -webkit-appearance:none; cursor:pointer; font-family:inherit;\">\n                            <sc-for list=\"{{ar.permOptions}}\" as=\"o\" hint-placeholder-count=\"3\"><option value=\"{{o.value}}\">{{o.label}}<\u002Foption><\u002Fsc-for>\n                          <\u002Fselect>\n                          <i class=\"bwi bwi-angle-down\" style=\"position:absolute; right:10px; top:50%; transform:translateY(-50%); font-size:13px; color:rgb(98,116,142); pointer-events:none;\"><\u002Fi>\n                        <\u002Fdiv>\n                      <\u002Fdiv>\n                      <div style=\"width:52px; flex-shrink:0; display:flex; align-items:center; justify-content:center;\">\n                        <div onclick=\"{{ar.onRemove}}\" style=\"width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:rgb(69,85,108);\" style-hover=\"background:rgb(233,238,243)\"><i class=\"bwi bwi-close\" style=\"font-size:16px;\"><\u002Fi><\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div style=\"display:flex; align-items:center; justify-content:flex-start; gap:12px; margin-top:24px;\">\n            <div onclick=\"{{saveColl}}\" style=\"height:40px; padding:0 20px; border-radius:8px; background:{{accent}}; display:flex; align-items:center; cursor:pointer;\" style-hover=\"filter:brightness(0.92)\"><span style=\"font-size:14px; font-weight:500; color:rgb(255,255,255);\">Save<\u002Fspan><\u002Fdiv>\n            <div onclick=\"{{closeCollModal}}\" style=\"height:40px; padding:0 20px; border:1px solid rgb(213,221,232); border-radius:8px; background:rgb(255,255,255); display:flex; align-items:center; cursor:pointer; color:rgb(16,24,40);\" style-hover=\"background:rgb(247,249,250)\"><span style=\"font-size:14px; font-weight:500;\">Cancel<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ MAIN AREA ============ -->\n    <div style=\"flex:1; min-width:0; height:100%; display:flex; flex-direction:column; background:rgb(255,255,255);\">\n\n      <!-- Page header -->\n      <div style=\"padding:32px {{padX}}; display:flex; flex-direction:row; flex-wrap:wrap; align-items:center; gap:12px; flex-shrink:0;\">\n        <sc-if value=\"{{single}}\" hint-placeholder-val=\"{{true}}\">\n          <div style=\"width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; background:{{titleTile}};\">\n            <i class=\"bwi {{titleIcon}}\" style=\"font-size:20px; color:rgb(255,255,255);\"><\u002Fi>\n          <\u002Fdiv>\n          <span style=\"font-size:30px; fo
